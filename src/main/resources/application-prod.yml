spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_db
    username: banking_user
    password: banking_password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  redis:
    host: localhost
    port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 3600000

jwt:
  expiration: 86400000

logging:
  level:
    root: INFO
    com.banking: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  compression:
    enabled: true
    min-response-size: 1024
